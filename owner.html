<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kedi Konaklama | Sahip Görünümü</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root{--bg:#f7f4ff;--panel:#fff;--text:#20183a;--muted:#6b6480;--line:#e8defc;--purple:#6d28d9;--pink:#db2777;--amber:#b45309;--green:#15803d;--shadow:0 18px 60px rgba(44,22,92,.10)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(139,92,246,.18),transparent 32rem),radial-gradient(circle at top right,rgba(219,39,119,.15),transparent 28rem),var(--bg)}
    h1,h2,h3,p{margin-top:0} .wrap{max-width:900px;margin:0 auto;padding:28px 18px 56px}.hero,.card{border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .hero{padding:28px;color:#fff;background:linear-gradient(135deg,rgba(109,40,217,.95),rgba(219,39,119,.88));margin-bottom:18px}.hero p{color:rgba(255,255,255,.85)}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.18);font-weight:700;font-size:13px}.card{background:rgba(255,255,255,.94);padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}.list{display:grid;gap:12px}.item{border:1px solid var(--line);background:#fff;border-radius:16px;padding:16px}.kv{display:grid;gap:8px}.kv div{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}.kv div:last-child{border-bottom:none}.kv span:first-child,.muted{color:var(--muted)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;background:#f5f3ff;color:var(--purple)}.badge.amber{background:#fffbeb;color:var(--amber)}.badge.green{background:#f0fdf4;color:var(--green)}.title{display:flex;flex-wrap:wrap;align-items:center;gap:8px}.divider{height:1px;background:var(--line);margin:14px 0}.note{white-space:pre-wrap;line-height:1.6}.empty{border:1px dashed #d8b4fe;border-radius:16px;padding:22px;text-align:center;color:var(--muted);background:#fcfaff}
    .field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--purple)}.field input,.field textarea{width:100%;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:13px;padding:12px 13px;outline:none}.field textarea{min-height:110px;resize:vertical}.btn{border:0;border-radius:13px;padding:11px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-weight:700;background:linear-gradient(135deg,var(--pink),#ec4899);color:#fff}.notice{border-radius:14px;padding:14px 16px;border:1px solid var(--line);background:#eff6ff;color:#1d4ed8;line-height:1.5}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,16px);padding:12px 16px;background:#20183a;color:#fff;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s ease;z-index:60}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:760px){.grid{grid-template-columns:1fr}.kv div{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap" id="owner-app">
    <section class="hero"><div class="eyebrow"><i class="ti ti-paw"></i> Sahip görünümü</div><h1>Bilgiler yükleniyor...</h1><p>Lütfen bekleyin.</p></section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const FLAGS=[['food','🍽️ Mama yedi'],['water','💧 Su içti'],['toilet','✨ Tuvalet normal'],['play','🎾 Oyun / aktif'],['medicine','💊 İlaç verildi'],['care','✂️ Bakım yapıldı']];
    const esc=(v='')=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    const fmtDate=v=>v?new Date(v+(String(v).includes('T')?'':'T12:00:00')).toLocaleDateString('tr-TR'):'—';
    const fmtDateTime=v=>v?new Date(v).toLocaleString('tr-TR',{dateStyle:'medium',timeStyle:'short'}):'—';
    const fmtTime=v=>String(v||'').slice(0,5);
    const toast=(m,e=false)=>{const t=document.getElementById('toast');t.textContent=m;t.style.background=e?'#be123c':'#20183a';t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2600)};
    const token=new URLSearchParams(location.search).get('owner')||'';
    const cfg=window.KEDI_APP_CONFIG||{};
    const db=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);
    const noteCard=n=>{const active=FLAGS.filter(([k])=>n.flags?.[k]);return `<article class="item"><div class="title"><h3 style="margin:0">${fmtDate(n.note_date)}</h3>${n.mood?`<span class="badge">${esc(n.mood)}</span>`:''}${n.appetite?`<span class="badge amber">${esc(n.appetite)}</span>`:''}</div>${active.length?`<div class="divider"></div><div class="title">${active.map(([,l])=>`<span class="badge green">${esc(l)}</span>`).join('')}</div>`:''}${n.body?`<div class="divider"></div><div class="note">${esc(n.body)}</div>`:''}${n.photo_url?`<div class="divider"></div><a href="${esc(n.photo_url)}" target="_blank" rel="noreferrer">Fotoğrafı aç</a>`:''}</article>`};
    const routineCard=r=>`<article class="item"><div class="title"><h3 style="margin:0">${fmtDate(r.routine_date)}</h3><span class="badge green">Yapıldı</span></div><div class="divider"></div><strong>${fmtTime(r.routine_time)} · ${esc(r.title)}</strong>${r.category?`<div class="muted">${esc(r.category)}</div>`:''}<div class="muted" style="margin-top:8px">Kayıt zamanı: ${fmtDateTime(r.completed_at)}</div></article>`;
    async function render(){
      const app=document.getElementById('owner-app');
      if(!token){app.innerHTML='<section class="card"><h1>Link geçersiz.</h1></section>';return}
      const {data,error}=await db.rpc('owner_portal',{p_token:token});
      if(error||!data){app.innerHTML=`<section class="card"><h1>Sayfa açılamadı.</h1><p class="muted">${esc(error?.message||'Kayıt bulunamadı.')}</p></section>`;return}
      const c=data.cat||{}, notes=data.daily_notes||[], routines=data.routine_logs||[], ownerNotes=data.owner_notes||[], items=data.packing_items||[];
      app.innerHTML=`<section class="hero"><div class="eyebrow"><i class="ti ti-paw"></i> Kedi konaklama günlüğü</div><h1>${esc(c.name||'Kedi')}</h1><p>${c.breed?esc(c.breed):'Konaklama takibi'}${c.owner_name?` · ${esc(c.owner_name)}`:''}</p></section><section class="grid"><article class="card"><h2>Bilgiler</h2><div class="kv"><div><span>Giriş</span><strong>${fmtDate(c.checkin_date)}</strong></div><div><span>Çıkış</span><strong>${fmtDate(c.checkout_date)}</strong></div><div><span>Beslenme</span><strong>${esc(c.diet||'—')}</strong></div><div><span>Mama detayı</span><strong>${esc(c.food||'—')}</strong></div><div><span>Takviye</span><strong>${esc(c.supplement||'—')}</strong></div><div><span>Sağlık</span><strong>${esc(c.health||'—')}</strong></div><div><span>Karakter</span><strong>${esc(c.character||'—')}</strong></div></div></article><article class="card"><h2>Getirilecekler</h2>${items.length?`<div class="list">${items.map(i=>`<div class="item"><strong>${esc(i.label)}</strong></div>`).join('')}</div>`:'<div class="empty">Ek eşya listesi yok.</div>'}${c.owner_items?`<div class="divider"></div><div class="notice">${esc(c.owner_items)}</div>`:''}</article></section><section class="card" style="margin-bottom:18px"><h2>Bakıcı güncellemeleri</h2><div class="list">${notes.length?notes.map(noteCard).join(''):'<div class="empty">Henüz günlük not eklenmedi.</div>'}</div></section><section class="card" style="margin-bottom:18px"><h2>Yapılan rutinler</h2><div class="list">${routines.length?routines.map(routineCard).join(''):'<div class="empty">Sahiple paylaşılmış rutin kaydı yok.</div>'}</div></section><section class="grid"><article class="card"><h2>Not gönder</h2><form id="owner-note-form"><div class="field"><label>Adınız</label><input id="owner-name"></div><div class="field"><label>Mesajınız</label><textarea id="owner-message"></textarea></div><button class="btn" type="submit"><i class="ti ti-send"></i> Gönder</button></form></article><article class="card"><h2>Gönderilen notlar</h2><div class="list">${ownerNotes.length?ownerNotes.map(n=>`<div class="item"><div class="muted">${fmtDateTime(n.created_at)} · ${esc(n.owner_name||'Sahip')}</div><div class="divider"></div><div class="note">${esc(n.message)}</div></div>`).join(''):'<div class="empty">Henüz not gönderilmedi.</div>'}</div></article></section>`;
      document.getElementById('owner-note-form').onsubmit=async e=>{e.preventDefault();const p_owner_name=document.getElementById('owner-name').value.trim(),p_message=document.getElementById('owner-message').value.trim();if(!p_message){toast('Mesaj boş olamaz.',true);return}const r=await db.rpc('submit_owner_note',{p_token:token,p_owner_name,p_message});if(r.error){toast(r.error.message||'Not gönderilemedi.',true);return}toast('Not gönderildi.');render()};
    }
    render();
  </script>
</body>
</html>
