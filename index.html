<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kedi Konaklama</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root{
      --bg:#f7f4ff;
      --panel:#ffffff;
      --panel-2:#fbf9ff;
      --text:#20183a;
      --muted:#6b6480;
      --line:#e8defc;
      --purple:#6d28d9;
      --purple-2:#8b5cf6;
      --pink:#db2777;
      --teal:#0f766e;
      --amber:#b45309;
      --red:#be123c;
      --green:#15803d;
      --blue:#2563eb;
      --shadow:0 18px 60px rgba(44, 22, 92, .10);
      --radius:18px;
      --radius-sm:12px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.18), transparent 32rem),
        radial-gradient(circle at top right, rgba(219,39,119,.15), transparent 28rem),
        var(--bg);
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .shell{max-width:1180px;margin:0 auto;padding:28px 18px 56px}
    .hero{
      display:grid;
      grid-template-columns:1.4fr .8fr;
      gap:18px;
      align-items:stretch;
      margin-bottom:18px;
    }
    .hero-card,.status-card,.panel,.auth-card,.owner-card{
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .hero-card{padding:28px}
    .eyebrow{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 12px;border-radius:999px;
      background:#efe7ff;color:var(--purple);font-weight:700;font-size:13px;
    }
    h1,h2,h3,p{margin-top:0}
    h1{font-size:42px;line-height:1.05;margin:16px 0 12px}
    h2{font-size:22px;margin-bottom:12px}
    h3{font-size:17px;margin-bottom:8px}
    .hero p,.muted{color:var(--muted)}
    .status-card{padding:22px;display:flex;flex-direction:column;justify-content:space-between;gap:16px}
    .status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .metric{
      border:1px solid var(--line);
      background:var(--panel-2);
      border-radius:14px;
      padding:14px;
    }
    .metric strong{display:block;font-size:28px;line-height:1.1}
    .metric span{color:var(--muted);font-size:13px}
    .notice{
      border-radius:14px;padding:14px 16px;border:1px solid var(--line);
      background:#faf8ff;color:var(--muted);line-height:1.5;
    }
    .notice.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .notice.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
    .notice.info{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
    .sidebar,.panel{padding:18px}
    .sidebar{
      position:sticky;top:18px;background:rgba(255,255,255,.92);
      border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    }
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .brand-badge{
      width:48px;height:48px;border-radius:16px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:24px;
    }
    .nav{display:grid;gap:8px}
    .nav button,.ghost{
      width:100%;text-align:left;border:1px solid var(--line);background:#fff;
      border-radius:14px;padding:12px 14px;cursor:pointer;color:var(--text);
      display:flex;align-items:center;gap:10px;transition:.16s ease;
    }
    .nav button:hover,.ghost:hover{transform:translateY(-1px);border-color:#cab8fb}
    .nav button.active{
      background:linear-gradient(135deg,#ede9fe,#fce7f3);
      border-color:#d8b4fe;color:var(--purple);font-weight:700;
    }
    .sidebar-foot{margin-top:16px;display:grid;gap:8px}
    .content{display:grid;gap:18px}
    .panel-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px;
    }
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .field{display:grid;gap:6px;margin-bottom:12px}
    .field label{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--purple)}
    .field input,.field select,.field textarea{
      width:100%;border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:13px;padding:12px 13px;outline:none;transition:.16s ease;
    }
    .field textarea{min-height:96px;resize:vertical}
    .field input:focus,.field select:focus,.field textarea:focus{
      border-color:#c4b5fd;box-shadow:0 0 0 4px rgba(139,92,246,.12);
    }
    .btn-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .btn{
      border:1px solid transparent;border-radius:13px;padding:11px 14px;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;
      transition:.16s ease;text-decoration:none;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple-2));color:white}
    .btn.pink{background:linear-gradient(135deg,var(--pink),#ec4899);color:white}
    .btn.teal{background:linear-gradient(135deg,var(--teal),#14b8a6);color:white}
    .btn.soft{background:#fff;border-color:var(--line);color:var(--text)}
    .btn.danger{background:#fff1f2;color:var(--red);border-color:#fecdd3}
    .btn.small{padding:8px 11px;border-radius:11px;font-size:13px}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .list{display:grid;gap:12px}
    .card{
      border:1px solid var(--line);background:#fff;border-radius:16px;padding:16px;
    }
    .card-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
    .title-line{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;
      font-size:12px;font-weight:800;background:#f5f3ff;color:var(--purple);
    }
    .badge.pink{background:#fdf2f8;color:var(--pink)}
    .badge.green{background:#f0fdf4;color:var(--green)}
    .badge.amber{background:#fffbeb;color:var(--amber)}
    .badge.blue{background:#eff6ff;color:var(--blue)}
    .meta{color:var(--muted);font-size:14px;line-height:1.55}
    .cat-avatar{
      width:58px;height:58px;border-radius:18px;background:#f5f3ff;display:grid;place-items:center;
      overflow:hidden;font-size:30px;flex:0 0 auto;border:1px solid var(--line);
    }
    .cat-avatar img{width:100%;height:100%;object-fit:cover}
    .cat-card-main{display:flex;gap:14px}
    .divider{height:1px;background:var(--line);margin:14px 0}
    .check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .check{
      display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:13px;padding:11px 12px;background:#fff;
      cursor:pointer;user-select:none;
    }
    .check input{accent-color:var(--purple)}
    .check.checked{border-color:#c4b5fd;background:#faf5ff;color:var(--purple);font-weight:700}
    .note-text{white-space:pre-wrap;line-height:1.6}
    .empty{
      border:1px dashed #d8b4fe;border-radius:16px;padding:22px;text-align:center;color:var(--muted);background:#fcfaff;
    }
    .auth-wrap{max-width:540px;margin:38px auto}
    .auth-card{padding:24px}
    .auth-tabs{display:flex;gap:10px;margin-bottom:16px}
    .auth-tabs button{flex:1}
    .hidden{display:none !important}
    .owner-wrap{max-width:860px;margin:0 auto;padding:28px 18px 56px}
    .owner-hero{
      background:linear-gradient(135deg,rgba(109,40,217,.95),rgba(219,39,119,.88));
      color:white;border-radius:24px;padding:28px;box-shadow:var(--shadow);margin-bottom:18px;
    }
    .owner-hero p{color:rgba(255,255,255,.85)}
    .owner-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .owner-card{padding:18px}
    .toast{
      position:fixed;left:50%;bottom:24px;transform:translate(-50%,16px);
      padding:12px 16px;background:#20183a;color:white;border-radius:999px;
      box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s ease;z-index:60;
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    .kv{display:grid;gap:8px}
    .kv div{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
    .kv div:last-child{border-bottom:none}
    .kv span:first-child{color:var(--muted)}
    .inline-copy{display:flex;gap:10px;align-items:center}
    .inline-copy input{flex:1}
    .link-input{
      width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fafafa;color:#4b5563;
    }
    .filters{display:flex;gap:10px;flex-wrap:wrap}
    .small-muted{font-size:12px;color:var(--muted)}
    @media(max-width:980px){
      .hero,.layout,.owner-grid{grid-template-columns:1fr}
      .sidebar{position:static}
    }
    @media(max-width:720px){
      h1{font-size:34px}
      .grid-2,.grid-3,.status-grid,.check-grid{grid-template-columns:1fr}
      .panel-head,.card-top{flex-direction:column}
      .kv div{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (() => {
    "use strict";

    const CONFIG = window.KEDI_APP_CONFIG || {};
    const app = document.getElementById("app");
    const toastEl = document.getElementById("toast");
    let db = null;
    let session = null;
    let state = {
      tab: "cats",
      cats: [],
      notes: [],
      ownerNotes: [],
      items: [],
      selectedNoteCatId: "",
      editingCatId: null,
      editingNoteId: null,
      ownerToken: new URLSearchParams(location.search).get("owner") || "",
      ownerPayload: null,
      authMode: "login",
      loading: false
    };

    const FLAGS = [
      ["food", "🍽️ Mama yedi"],
      ["water", "💧 Su içti"],
      ["toilet", "✨ Tuvalet normal"],
      ["play", "🎾 Oyun / aktif"],
      ["medicine", "💊 İlaç verildi"],
      ["care", "✂️ Bakım yapıldı"]
    ];

    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
    const esc = (v="") => String(v ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
    const fmtDate = (v) => v ? new Date(v + (String(v).includes("T") ? "" : "T12:00:00")).toLocaleDateString("tr-TR") : "—";
    const fmtDateTime = (v) => v ? new Date(v).toLocaleString("tr-TR", {dateStyle:"medium", timeStyle:"short"}) : "—";
    const today = () => new Date().toISOString().slice(0,10);
    const uid = () => session?.user?.id || null;

    function toast(message, type="ok"){
      toastEl.textContent = message;
      toastEl.style.background = type === "error" ? "#be123c" : type === "info" ? "#1d4ed8" : "#20183a";
      toastEl.classList.add("show");
      clearTimeout(toastEl._timer);
      toastEl._timer = setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    function baseUrl(){
      return location.origin + location.pathname;
    }

    function ownerLink(token){
      return `${baseUrl()}?owner=${encodeURIComponent(token)}`;
    }

    function setBusy(flag){
      state.loading = flag;
      $$('[data-busy]').forEach(btn => btn.disabled = flag);
    }

    function initClient(){
      if(!CONFIG.supabaseUrl || !CONFIG.supabaseAnonKey){
        renderMissingConfig();
        return false;
      }
      db = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
      return true;
    }

    async function boot(){
      if(!initClient()) return;
      if(state.ownerToken){
        await loadOwnerPortal();
        return;
      }
      const result = await db.auth.getSession();
      session = result.data.session;
      db.auth.onAuthStateChange(async (_event, currentSession) => {
        session = currentSession;
        if(!state.ownerToken){
          if(session){
            await loadAdminData();
            renderAdmin();
          } else {
            renderAuth();
          }
        }
      });
      if(session){
        await loadAdminData();
        renderAdmin();
      } else {
        renderAuth();
      }
    }

    function renderMissingConfig(){
      app.innerHTML = `
        <main class="auth-wrap">
          <section class="auth-card">
            <div class="eyebrow"><i class="ti ti-settings"></i> Kurulum gerekli</div>
            <h1 style="font-size:34px">Site hazır, Supabase bilgisi bekliyor.</h1>
            <p class="muted">Repo içindeki <strong>config.js</strong> dosyasına Supabase Project URL ve anon public key girildiğinde site çalışır.</p>
            <div class="notice info">
              Veriler tarayıcıda değil, veritabanında tutulacak. Sahip notları özel owner linkinden gönderilecek; admin şifresi URL'ye taşınmayacak.
            </div>
          </section>
        </main>
      `;
    }

    function renderAuth(){
      app.innerHTML = `
        <main class="auth-wrap">
          <section class="auth-card">
            <div class="eyebrow"><i class="ti ti-paw"></i> Kedi Konaklama Yönetimi</div>
            <h1 style="font-size:34px">Admin paneli</h1>
            <p class="muted">Kedileri, günlük notları ve sahip mesajlarını buradan yönetin.</p>
            <div class="auth-tabs">
              <button class="btn ${state.authMode === "login" ? "primary" : "soft"}" data-auth-mode="login">Giriş</button>
              <button class="btn ${state.authMode === "signup" ? "primary" : "soft"}" data-auth-mode="signup">Hesap oluştur</button>
            </div>
            <form id="auth-form">
              <div class="field">
                <label>E-posta</label>
                <input id="auth-email" type="email" autocomplete="email" required>
              </div>
              <div class="field">
                <label>Şifre</label>
                <input id="auth-password" type="password" minlength="6" autocomplete="${state.authMode === "signup" ? "new-password" : "current-password"}" required>
              </div>
              <div class="btn-row">
                <button class="btn primary" data-busy type="submit">
                  <i class="ti ti-lock"></i> ${state.authMode === "signup" ? "Hesap oluştur" : "Giriş yap"}
                </button>
              </div>
            </form>
            <div class="notice info" style="margin-top:16px">
              İlk kurulumda hesap oluşturduktan sonra aynı e-posta ile giriş yapın. Supabase projenizde e-posta doğrulaması açıksa doğrulama postası gerekebilir.
            </div>
          </section>
        </main>
      `;
      bindAuth();
    }

    function bindAuth(){
      $$('[data-auth-mode]').forEach(btn => {
        btn.onclick = () => {
          state.authMode = btn.dataset.authMode;
          renderAuth();
        };
      });
      $('#auth-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = $('#auth-email').value.trim();
        const password = $('#auth-password').value;
        setBusy(true);
        try{
          const result = state.authMode === "signup"
            ? await db.auth.signUp({ email, password })
            : await db.auth.signInWithPassword({ email, password });
          if(result.error) throw result.error;
          toast(state.authMode === "signup" ? "Hesap oluşturuldu." : "Giriş yapıldı.");
          if(state.authMode === "signup" && !result.data.session){
            toast("E-posta doğrulaması bekleniyor.", "info");
          }
        }catch(err){
          toast(err.message || "Kimlik doğrulama başarısız.", "error");
        }finally{
          setBusy(false);
        }
      };
    }

    async function loadAdminData(){
      if(!uid()) return;
      setBusy(true);
      try{
        const [catsRes, notesRes, ownerRes, itemsRes] = await Promise.all([
          db.from("cats").select("*").order("created_at", {ascending:false}),
          db.from("daily_notes").select("*").order("created_at", {ascending:false}),
          db.from("owner_notes").select("*").order("created_at", {ascending:false}),
          db.from("packing_items").select("*").order("created_at", {ascending:true})
        ]);
        [catsRes, notesRes, ownerRes, itemsRes].forEach(r => { if(r.error) throw r.error; });
        state.cats = catsRes.data || [];
        state.notes = notesRes.data || [];
        state.ownerNotes = ownerRes.data || [];
        state.items = itemsRes.data || [];
        if(!state.selectedNoteCatId && state.cats[0]) state.selectedNoteCatId = state.cats[0].id;
      }catch(err){
        toast(err.message || "Veriler yüklenemedi.", "error");
      }finally{
        setBusy(false);
      }
    }

    function renderAdmin(){
      const catsCount = state.cats.length;
      const ownerUnread = state.ownerNotes.length;
      const notesCount = state.notes.length;
      app.innerHTML = `
        <div class="shell">
          <section class="hero">
            <div class="hero-card">
              <div class="eyebrow"><i class="ti ti-paw"></i> Kedi Konaklama</div>
              <h1>Takip paneli</h1>
              <p>Kediler, günlük bakım notları, sahip mesajları ve paylaşılabilir sahip linkleri tek panelde tutulur.</p>
              <div class="btn-row">
                <button class="btn primary" data-nav="cats"><i class="ti ti-plus"></i> Kedi ekle</button>
                <button class="btn pink" data-nav="notes"><i class="ti ti-notes"></i> Günlük not gir</button>
              </div>
            </div>
            <div class="status-card">
              <div class="status-grid">
                <div class="metric"><strong>${catsCount}</strong><span>aktif kedi</span></div>
                <div class="metric"><strong>${notesCount}</strong><span>günlük not</span></div>
                <div class="metric"><strong>${ownerUnread}</strong><span>sahip notu</span></div>
                <div class="metric"><strong>${state.items.length}</strong><span>eşya maddesi</span></div>
              </div>
              <div class="notice ok">Kayıtlar Supabase üzerinde saklanır; tarayıcı temizliği verileri silmez.</div>
            </div>
          </section>
          <section class="layout">
            <aside class="sidebar">
              <div class="brand">
                <div class="brand-badge">🐾</div>
                <div><strong>Yönetim</strong><div class="small-muted">${esc(session?.user?.email || "")}</div></div>
              </div>
              <nav class="nav">
                ${navButton("cats","ti-paw","Kediler")}
                ${navButton("notes","ti-notes","Günlük not")}
                ${navButton("owners","ti-message-circle","Sahip notları")}
                ${navButton("items","ti-backpack","Eşya listesi")}
              </nav>
              <div class="sidebar-foot">
                <button class="ghost" id="refresh-admin"><i class="ti ti-refresh"></i> Yenile</button>
                <button class="ghost" id="logout"><i class="ti ti-logout"></i> Çıkış</button>
              </div>
            </aside>
            <main class="content">
              ${state.tab === "cats" ? catsPanel() : ""}
              ${state.tab === "notes" ? notesPanel() : ""}
              ${state.tab === "owners" ? ownerNotesPanel() : ""}
              ${state.tab === "items" ? itemsPanel() : ""}
            </main>
          </section>
        </div>
      `;
      bindAdmin();
    }

    function navButton(id, icon, label){
      return `<button class="${state.tab === id ? "active" : ""}" data-nav="${id}"><i class="ti ${icon}"></i> ${label}</button>`;
    }

    function catsPanel(){
      const editing = state.cats.find(c => c.id === state.editingCatId) || null;
      return `
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>${editing ? "Kedi düzenle" : "Yeni kedi"}</h2>
              <p class="muted">Kedi bilgileri ve sahibi için paylaşılacak özel link burada hazırlanır.</p>
            </div>
            ${editing ? `<button class="btn soft" id="cancel-cat-edit"><i class="ti ti-x"></i> Düzenlemeyi bırak</button>` : ""}
          </div>
          <form id="cat-form">
            <div class="grid-2">
              ${input("cat-name","Kedi adı *", editing?.name || "", "text", true)}
              ${input("cat-breed","Cins", editing?.breed || "")}
              ${input("cat-age","Yaş", editing?.age || "")}
              ${input("cat-owner-name","Sahibi", editing?.owner_name || "")}
              ${input("cat-owner-phone","Sahibinin telefonu", editing?.owner_phone || "")}
              ${input("cat-photo-url","Fotoğraf URL", editing?.photo_url || "")}
              ${input("cat-checkin","Giriş tarihi", editing?.checkin_date || "", "date")}
              ${input("cat-checkout","Çıkış tarihi", editing?.checkout_date || "", "date")}
            </div>
            <div class="grid-2">
              ${input("cat-diet","Beslenme", editing?.diet || "")}
              ${input("cat-supplement","Takviye", editing?.supplement || "")}
            </div>
            ${textarea("cat-food","Mama detayı", editing?.food || "")}
            ${textarea("cat-health","Sağlık / dikkat", editing?.health || "")}
            ${textarea("cat-character","Karakter", editing?.character || "")}
            ${textarea("cat-private-note","Sadece admin notu", editing?.private_note || "")}
            ${textarea("cat-owner-items","Sahibin getirecekleri", editing?.owner_items || "")}
            <div class="btn-row">
              <button class="btn teal" data-busy type="submit"><i class="ti ti-device-floppy"></i> ${editing ? "Kaydet" : "Kedi oluştur"}</button>
            </div>
          </form>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Kedi listesi</h2>
              <p class="muted">Sahip linkini buradan kopyalayabilirsiniz.</p>
            </div>
          </div>
          <div class="list">

    function bindCatPanel(){
      const form = $('#cat-form');

            user_id: uid(),
            name: $('#cat-name').value.trim(),

            age: $('#cat-age').value.trim() || null,

            private_note: $('#cat-private-note').value.trim() || null,
            owner_items: $('#cat-owner-items').value.trim() || null,

            renderAdmin();
            toast("Kedi kaydedildi.");

            toast(err.message || "Kedi kaydedilemedi.", "error");

            setBusy(false);

        window.scrollTo({top:0, behavior:"smooth"});
      });
      $$('[data-delete-cat]').forEach(btn => btn.onclick = async () => {
        if(!confirm("Bu kedi kaydı ve ilişkili kayıtlar silinsin mi?")) return;
        setBusy(true);

          await loadAdminData();
          renderAdmin();

          toast("Link kopyalanamadı.", "error");

      $('#cancel-cat-edit')?.addEventListener("click", () => {
        state.editingCatId = null;

      });

            body: $('#note-body').value.trim() || null,
            flags
          };
          if(!payload.cat_id){
            toast("Kedi seçin.", "error");
            return;
          }
          setBusy(true);
          try{
            const res = state.editingNoteId
              ? await db.from("daily_notes").update(payload).eq("id", state.editingNoteId).select().single()
              : await db.from("daily_notes").insert(payload).select().single();
            if(res.error) throw res.error;

            renderAdmin();
            toast("Günlük not kaydedildi.");

            setBusy(false);

        }finally{
          setBusy(false);
        }

        state.editingNoteId = null;
        renderAdmin();
      });

          toast(err.message || "Not gönderilemedi.", "error");
        }finally{
          setBusy(false);
        }
      };
    }

    boot();
  })();
  </script>
</body>
