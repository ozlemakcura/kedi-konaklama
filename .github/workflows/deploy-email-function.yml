name: E-posta Bildirim Fonksiyonunu Yayınla

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Supabase projesine bağlan
        run: npx supabase@latest link --project-ref adktguygepgmpopeirgu
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Resend anahtarını Supabase'e kaydet
        run: npx supabase@latest secrets set RESEND_API_KEY="$RESEND_API_KEY"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: E-posta fonksiyonunu yayınla
        run: npx supabase@latest functions deploy notify-owner-interaction --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
